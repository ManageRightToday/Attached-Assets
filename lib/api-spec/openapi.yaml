openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PropVault API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: search
    description: Property manager search
  - name: managers
    description: Manager details
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /search:
    get:
      operationId: searchManagers
      tags: [search]
      summary: Search property managers by ZIP code
      parameters:
        - name: zip
          in: query
          required: true
          schema:
            type: string
            minLength: 5
            maxLength: 5
        - name: radius
          in: query
          required: false
          schema:
            type: integer
            enum: [5, 10, 25, 50]
            default: 10
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "400":
          description: Invalid ZIP code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /managers/{id}:
    get:
      operationId: getManager
      tags: [managers]
      summary: Get full manager profile with contact info and reviews
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Manager details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerDetail"
        "404":
          description: Manager not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [managers]
      summary: Get platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Manager:
      type: object
      required:
        - id
        - name
        - address
        - city
        - googleRating
        - googleReviewCount
        - bbbRating
        - bbbComplaints
        - feeTransparent
        - yearsInBusiness
        - specialties
        - responseTime
        - score
        - rank
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        city:
          type: string
        googleRating:
          type: number
        googleReviewCount:
          type: integer
        bbbRating:
          type: string
        bbbComplaints:
          type: integer
        feePercent:
          type: ["number", "null"]
        feeTransparent:
          type: boolean
        yearsInBusiness:
          type: integer
        specialties:
          type: array
          items:
            type: string
        responseTime:
          type: string
        score:
          type: integer
        rank:
          type: integer
        locked:
          type: boolean

    Review:
      type: object
      required: [authorName, rating, text, relativeTime]
      properties:
        authorName:
          type: string
        rating:
          type: integer
        text:
          type: string
        relativeTime:
          type: string

    ManagerDetail:
      type: object
      required:
        - id
        - name
        - address
        - city
        - googleRating
        - googleReviewCount
        - bbbRating
        - bbbComplaints
        - feeTransparent
        - yearsInBusiness
        - specialties
        - responseTime
        - score
        - rank
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        city:
          type: string
        googleRating:
          type: number
        googleReviewCount:
          type: integer
        bbbRating:
          type: string
        bbbComplaints:
          type: integer
        feePercent:
          type: ["number", "null"]
        feeTransparent:
          type: boolean
        yearsInBusiness:
          type: integer
        specialties:
          type: array
          items:
            type: string
        responseTime:
          type: string
        score:
          type: integer
        rank:
          type: integer
        locked:
          type: boolean
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        googleMapsUrl:
          type: ["string", "null"]
        openNow:
          type: ["boolean", "null"]
        openingHours:
          type: array
          items:
            type: string
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        about:
          type: ["string", "null"]

    SearchResults:
      type: object
      required:
        - total
        - zip
        - radius
        - freeManagers
        - lockedCount
      properties:
        total:
          type: integer
        zip:
          type: string
        radius:
          type: integer
        freeManagers:
          type: array
          items:
            $ref: "#/components/schemas/Manager"
        lockedCount:
          type: integer
        isDemo:
          type: boolean

    PlatformStats:
      type: object
      required:
        - totalManagers
        - citiesCovered
        - avgTrustScore
        - managersWithAPlus
      properties:
        totalManagers:
          type: integer
        citiesCovered:
          type: integer
        avgTrustScore:
          type: number
        managersWithAPlus:
          type: integer
